<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contacto | Helping Teachers</title>
  <meta name="description" content="Comunícate con el equipo de Helping Teachers. ¿Preguntas, comentarios o necesitas ayuda con una herramienta? Estamos aquí.">
  <meta name="theme-color" content="#2563EB">

  <link rel="canonical" href="https://helpingteachers.io/es/contacto/">
  <link rel="icon" href="../../assets/favicon/favicon.ico">
  <link rel="stylesheet" href="../../css/styles.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NGG1JCMT2V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-NGG1JCMT2V');
  </script>
</head>

<body>
  <header class="site-header">
    <nav class="navbar container">
      <a class="logo" href="../index.html">
        <img src="../../assets/logo/helping-teachers-logo-horizontal.webp" alt="Helping Teachers logo">
      </a>

      <div class="nav-actions">
        <a class="language-switch" href="../../contact/">English</a>
      </div>
    </nav>
  </header>

  <main class="tool-page">
    <div class="container">
      <section class="tool-shell contact-shell">
        <a class="back-link" href="../index.html">← Volver al Panel</a>

        <div class="contact-content">
          <span class="eyebrow">📬 Estamos para ayudarte</span>
          <h1>Contáctanos</h1>
          <p class="contact-intro">
            ¿Tienes una pregunta, encontraste un error o quieres sugerir una herramienta? Envíanos
            un mensaje y te responderemos. Leemos todos los mensajes.
          </p>

          <form class="contact-form" id="contactForm" action="https://formspree.io/f/mvzjqggd" method="POST">
            <div class="contact-field">
              <label for="contactName">Nombre</label>
              <input type="text" id="contactName" name="name" placeholder="Tu nombre" autocomplete="name" required>
            </div>

            <div class="contact-field">
              <label for="contactEmail">Correo electrónico</label>
              <input type="email" id="contactEmail" name="email" placeholder="tu@email.com" autocomplete="email" required>
            </div>

            <div class="contact-field">
              <label for="contactMessage">Mensaje</label>
              <textarea id="contactMessage" name="message" rows="6" placeholder="¿En qué podemos ayudarte?" required></textarea>
            </div>

            <input type="hidden" name="_subject" value="Nuevo mensaje de Helping Teachers">
            <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

            <button type="submit" class="btn btn-primary contact-submit">Enviar mensaje</button>

            <p class="contact-status" id="contactStatus" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span data-year></span> Helping Teachers.</p>
      <div class="footer-links">
        <a href="../privacidad/">Privacidad</a>
        <a href="../terminos/">Términos</a>
        <a href="../contacto/">Contacto</a>
      </div>
    </div>
  </footer>

  <script src="../../js/main.js"></script>
  <script src="../../js/contact.js"></script>
</body>

</html>
